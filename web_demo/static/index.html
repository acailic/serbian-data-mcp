<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian Data Explorer — Live Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #9ca3af;
    --accent: #c42b2b;
    --accent-light: #e63946;
    --blue: #3072c6;
    --blue-light: #4d94de;
    --gold: #d4a843;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .header .flag { font-size: 24px; line-height: 1; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header h1 span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 13px;
    margin-left: 6px;
  }
  .header .links {
    margin-left: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .header .links a {
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .header .links a:hover { color: var(--blue-light); }
  .header .links .github { font-size: 18px; }

  /* Status bar */
  .status-bar {
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .status-bar .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .status-bar .dot.ok { background: #22c55e; }
  .status-bar .dot.err { background: var(--accent); }
  .status-bar .dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Messages */
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--blue);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .msg a { color: var(--blue-light); text-decoration: underline; }
  .msg ul, .msg ol { margin: 6px 0 6px 20px; }

  /* Loading */
  .loading-indicator {
    align-self: flex-start;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-dim);
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .loading-indicator.visible { display: block; }

  /* Input area */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .suggestions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .suggestions button {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .suggestions button:hover {
    border-color: var(--blue);
    color: var(--blue-light);
    background: rgba(48, 114, 198, 0.08);
  }

  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--blue); }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row button {
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: var(--blue);
    color: white;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-row button:hover { background: var(--blue-light); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-dim);
  }
  .welcome .icon { font-size: 44px; margin-bottom: 10px; }
  .welcome h2 {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .welcome p {
    font-size: 13px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .welcome .examples {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .welcome .examples button {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .welcome .examples button:hover {
    border-color: var(--blue);
    color: var(--blue-light);
    background: rgba(48, 114, 198, 0.08);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .header h1 span { display: none; }
    .msg { max-width: 92%; }
    .welcome .examples { gap: 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="flag">🇷🇸</div>
  <h1>Serbian Data Explorer<span>MCP + Gemini Live Demo</span></h1>
  <div class="links">
    <a href="https://github.com/acailic/serbian-data-mcp" target="_blank" class="github" title="GitHub">⌨</a>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div class="dot loading" id="statusDot"></div>
  <span id="statusText">Checking server health...</span>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">📊</div>
    <h2>Ask anything about Serbian open data</h2>
    <p>
      Search 3,400+ datasets from data.gov.rs in natural language.
      Find demographics, budgets, health stats, education data and more.
      Powered by MCP tools + Google Gemini.
    </p>
    <div class="examples">
      <button onclick="send('Search for population datasets')">Search population data</button>
      <button onclick="send('What organizations publish data?')">List publishers</button>
      <button onclick="send('Find datasets about air quality')">Air quality</button>
      <button onclick="send('Show me budget datasets from RZS')">Budget / RZS</button>
      <button onclick="send('Suggest datasets about education')">Education</button>
    </div>
  </div>
  <div class="loading-indicator" id="loading">Thinking...</div>
</div>

<div class="input-area">
  <div class="suggestions" id="suggestions">
    <button onclick="send('health check')">Health Check</button>
    <button onclick="send('Search: stanovništvo')">Population</button>
    <button onclick="send('Search: budžet')">Budget</button>
    <button onclick="send('Search: vazduh')">Air quality</button>
    <button onclick="send('List organizations')">Organizations</button>
  </div>
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask about Serbian data... (English or Serbian)" autofocus>
    <button id="sendBtn" onclick="handleSend()">Send</button>
  </div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const welcome = document.getElementById('welcome');
const loading = document.getElementById('loading');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const history = [];

// Check health on load
fetch('/health').then(r => r.json()).then(d => {
  if (d.status === 'ok' && d.gemini_configured) {
    statusDot.className = 'dot ok';
    statusText.textContent = 'Connected — Gemini AI ready';
  } else if (d.status === 'ok') {
    statusDot.className = 'dot err';
    statusText.textContent = 'Server OK but Gemini API key not configured';
  } else {
    statusDot.className = 'dot err';
    statusText.textContent = 'Server health check failed';
  }
}).catch(() => {
  statusDot.className = 'dot err';
  statusText.textContent = 'Cannot reach server';
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

function send(text) {
  userInput.value = text;
  handleSend();
}

async function handleSend() {
  const message = userInput.value.trim();
  if (!message) return;

  if (welcome) welcome.style.display = 'none';
  appendMessage('user', message);
  history.push({ role: 'user', text: message });
  userInput.value = '';
  sendBtn.disabled = true;
  loading.classList.add('visible');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history }),
    });
    const data = await res.json();
    const response = data.response || 'No response received.';
    appendMessage('assistant', response);
    history.push({ role: 'assistant', text: response });
  } catch (err) {
    appendMessage('assistant', `Connection error: ${err.message}. Try refreshing the page.`);
  } finally {
    sendBtn.disabled = false;
    loading.classList.remove('visible');
    userInput.focus();
  }
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = formatMarkdown(text);
  chatArea.insertBefore(div, loading);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatMarkdown(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\n/g, '<br>');
}
</script>
</body>
</html>
