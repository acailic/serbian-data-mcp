<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian Data Explorer — / Istraživač srpskih podataka</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #9ca3af;
    --accent: #c42b2b;
    --accent-light: #e63946;
    --blue: #3072c6;
    --blue-light: #4d94de;
    --gold: #d4a843;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .header .flag { font-size: 24px; line-height: 1; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header h1 span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 13px;
    margin-left: 6px;
  }
  .header .links {
    margin-left: auto;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* Language toggle */
  .lang-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    font-size: 12px;
  }
  .lang-toggle button {
    padding: 4px 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    transition: all 0.2s;
  }
  .lang-toggle button.active {
    background: var(--blue);
    color: white;
  }
  .lang-toggle button:not(.active):hover {
    background: rgba(48, 114, 198, 0.15);
    color: var(--blue-light);
  }

  .header .links a {
    font-size: 18px;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .header .links a:hover { color: var(--blue-light); }

  /* Status bar */
  .status-bar {
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .status-bar .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .status-bar .dot.ok { background: #22c55e; }
  .status-bar .dot.err { background: var(--accent); }
  .status-bar .dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Messages */
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
    background: var(--blue);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.5;
  }
  .msg code {
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
  }
  .msg a { color: var(--blue-light); text-decoration: underline; }
  .msg ul, .msg ol { margin: 6px 0 6px 20px; }

  /* Loading */
  .loading-indicator {
    align-self: flex-start;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 13px;
    color: var(--text-dim);
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .loading-indicator.visible { display: block; }

  /* Input area */
  .input-area {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .suggestions {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .suggestions button {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .suggestions button:hover {
    border-color: var(--blue);
    color: var(--blue-light);
    background: rgba(48, 114, 198, 0.08);
  }

  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--blue); }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row button {
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: var(--blue);
    color: white;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-row button:hover { background: var(--blue-light); }
  .input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-dim);
  }
  .welcome .icon { font-size: 44px; margin-bottom: 10px; }
  .welcome h2 {
    font-size: 18px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .welcome p {
    font-size: 13px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }
  .welcome .examples {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .welcome .examples button {
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .welcome .examples button:hover {
    border-color: var(--blue);
    color: var(--blue-light);
    background: rgba(48, 114, 198, 0.08);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .header h1 span { display: none; }
    .msg { max-width: 92%; }
    .welcome .examples { gap: 4px; }
    .suggestions { gap: 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="flag">🇷🇸</div>
  <h1 data-i18n="title">Serbian Data Explorer<span>MCP + Gemini Live Demo</span></h1>
  <div class="links">
    <div class="lang-toggle">
      <button id="langEn" class="active" onclick="setLang('en')">EN</button>
      <button id="langSr" onclick="setLang('sr')">SR</button>
    </div>
    <a href="https://github.com/acailic/serbian-data-mcp" target="_blank" title="GitHub">⌨</a>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <div class="dot loading" id="statusDot"></div>
  <span id="statusText">Checking server health...</span>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">📊</div>
    <h2 id="welcomeTitle">Ask anything about Serbian open data</h2>
    <p id="welcomeDesc">
      Search 3,400+ datasets from data.gov.rs in natural language.
      Find demographics, budgets, health stats, education data and more.
      Powered by MCP tools + Google Gemini.
    </p>
    <div class="examples" id="welcomeExamples"></div>
  </div>
  <div class="loading-indicator" id="loading">Thinking...</div>
</div>

<div class="input-area">
  <div class="suggestions" id="suggestions"></div>
  <div class="input-row">
    <input type="text" id="userInput" data-i18n-placeholder="placeholder" placeholder="Ask about Serbian data... (English or Serbian)" autofocus>
    <button id="sendBtn" data-i18n="sendBtn" onclick="handleSend()">Send</button>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// i18n — English / Serbian translations
// ---------------------------------------------------------------------------
const i18n = {
  en: {
    title: 'Serbian Data Explorer<span>MCP + Gemini Live Demo</span>',
    welcomeTitle: 'Ask anything about Serbian open data',
    welcomeDesc: 'Search 3,400+ datasets from data.gov.rs in natural language. Find demographics, budgets, health stats, education data and more. Powered by MCP tools + Google Gemini.',
    placeholder: 'Ask about Serbian data… (English or Serbian)',
    sendBtn: 'Send',
    loading: 'Thinking…',
    statusOk: 'Connected — Gemini AI ready',
    statusNoKey: 'Server OK but Gemini API key not configured',
    statusFail: 'Server health check failed',
    statusUnreach: 'Cannot reach server',
    statusChecking: 'Checking server health…',
    connErr: 'Connection error: {msg}. Try refreshing the page.',
    examples: [
      { label: 'Population data',   query: 'Search for population datasets' },
      { label: 'Publishers',        query: 'What organizations publish data?' },
      { label: 'Air quality',       query: 'Find datasets about air quality' },
      { label: 'Budget / RZS',      query: 'Show me budget datasets from RZS' },
      { label: 'Education',         query: 'Suggest datasets about education' },
    ],
    quickBtns: [
      { label: 'Health Check',  query: 'health check' },
      { label: 'Population',    query: 'Search: stanovništvo' },
      { label: 'Budget',        query: 'Search: budžet' },
      { label: 'Air quality',   query: 'Search: vazduh' },
      { label: 'Organizations', query: 'List organizations' },
    ],
  },
  sr: {
    title: 'Istraživač srpskih podataka<span>MCP + Gemini демо</span>',
    welcomeTitle: 'Питај било шта о отвореним подацима Србије',
    welcomeDesc: 'Претражи 3.400+ скупова података са data.gov.rs на природном језику. Нађи демографске податке, буџете, здравствене статистике, образовање и више. Покреће MCP алати + Google Gemini.',
    placeholder: 'Питај о српким подацима… (српски или енглески)',
    sendBtn: 'Пошаљи',
    loading: 'Размишљам…',
    statusOk: 'Повезан — Gemini AI спреман',
    statusNoKey: 'Сервер ради али Gemini API кључ није подешен',
    statusFail: 'Провера здравља сервера није успела',
    statusUnreach: 'Не могу да се повежем са сервером',
    statusChecking: 'Проверавам здравље сервера…',
    connErr: 'Грешка везе: {msg}. Покушај да освежиш страницу.',
    examples: [
      { label: 'Становништво',    query: 'Претражи скупове података о становништву' },
      { label: 'Издавачи',        query: 'Које организације објављују податке?' },
      { label: 'Квалитет ваздуха', query: 'Нађи податке о квалитету ваздуха' },
      { label: 'Буџет / РЗС',     query: 'Покажи скупове података о буџету од РЗС' },
      { label: 'Образовање',       query: 'Предложи скупове података о образовању' },
    ],
    quickBtns: [
      { label: 'Провера',        query: 'health check' },
      { label: 'Становништво',    query: 'Претрага: stanovništvo' },
      { label: 'Буџет',          query: 'Претрага: budžet' },
      { label: 'Ваздух',          query: 'Претрага: vazduh' },
      { label: 'Организације',     query: 'Листа организација' },
    ],
  },
};

let lang = localStorage.getItem('lang') || 'en';

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  applyLang();
}

function applyLang() {
  const t = i18n[lang];
  document.documentElement.lang = lang;

  // Toggle buttons
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  document.getElementById('langSr').classList.toggle('active', lang === 'sr');

  // Text content
  document.getElementById('welcomeTitle').textContent = t.welcomeTitle;
  document.getElementById('welcomeDesc').textContent = t.welcomeDesc;
  document.getElementById('userInput').placeholder = t.placeholder;
  document.getElementById('sendBtn').textContent = t.sendBtn;
  document.getElementById('loading').textContent = t.loading;

  // Title (contains HTML span)
  document.querySelector('[data-i18n="title"]').innerHTML = t.title;

  // Render example buttons
  const exDiv = document.getElementById('welcomeExamples');
  exDiv.innerHTML = '';
  t.examples.forEach(e => {
    const btn = document.createElement('button');
    btn.textContent = e.label;
    btn.onclick = () => send(e.query);
    exDiv.appendChild(btn);
  });

  // Render quick-action buttons
  const qDiv = document.getElementById('suggestions');
  qDiv.innerHTML = '';
  t.quickBtns.forEach(q => {
    const btn = document.createElement('button');
    btn.textContent = q.label;
    btn.onclick = () => send(q.query);
    qDiv.appendChild(btn);
  });
}

// ---------------------------------------------------------------------------
// Chat logic
// ---------------------------------------------------------------------------
const chatArea = document.getElementById('chatArea');
const welcome = document.getElementById('welcome');
const loading = document.getElementById('loading');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const history = [];

// Check health
fetch('/health').then(r => r.json()).then(d => {
  const t = i18n[lang];
  if (d.status === 'ok' && d.gemini_configured) {
    statusDot.className = 'dot ok';
    statusText.textContent = t.statusOk;
  } else if (d.status === 'ok') {
    statusDot.className = 'dot err';
    statusText.textContent = t.statusNoKey;
  } else {
    statusDot.className = 'dot err';
    statusText.textContent = t.statusFail;
  }
}).catch(() => {
  const t = i18n[lang];
  statusDot.className = 'dot err';
  statusText.textContent = t.statusUnreach;
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

function send(text) {
  userInput.value = text;
  handleSend();
}

async function handleSend() {
  const message = userInput.value.trim();
  if (!message) return;

  if (welcome) welcome.style.display = 'none';
  appendMessage('user', message);
  history.push({ role: 'user', text: message });
  userInput.value = '';
  sendBtn.disabled = true;
  loading.classList.add('visible');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history, lang }),
    });
    const data = await res.json();
    const response = data.response || 'No response received.';
    appendMessage('assistant', response);
    history.push({ role: 'assistant', text: response });
  } catch (err) {
    const t = i18n[lang];
    appendMessage('assistant', t.connErr.replace('{msg}', err.message));
  } finally {
    sendBtn.disabled = false;
    loading.classList.remove('visible');
    userInput.focus();
  }
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = formatMarkdown(text);
  chatArea.insertBefore(div, loading);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatMarkdown(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\n/g, '<br>');
}

// Init
applyLang();
</script>
</body>
</html>
